# Deploys the TerraSlate marketing dashboard to GitHub Pages.
# - daily cron:            pull fresh Meta data -> commit -> build -> render -> deploy
# - manual "Run workflow": same as the cron (on-demand refresh)
# - on push to main:       build + render + deploy the committed data.json (no re-pull)
#
# The daily DATA pull needs a Meta Graph API token in the repo secret META_ACCESS_TOKEN
# (Settings > Secrets and variables > Actions). Without it, the pull step is skipped and the
# cron just redeploys the committed data.json.
name: dashboard-deploy

on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 06:00 America/Denver (MDT). Adjust for your timezone.
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write   # to commit the daily-refreshed data.json
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Pull fresh Meta data on cron / manual runs only (not on push), and only if a token exists.
      - name: Pull Meta data
        if: ${{ github.event_name != 'push' && env.META_ACCESS_TOKEN != '' }}
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: "24540744"
        run: python3 pull/meta.py

      # Reconcile + derive + render (gates run here; a bad pull cannot deploy).
      - name: Build and render
        run: |
          python3 build_dashboard.py
          python3 render.py

      # Persist the refreshed data + page (only meaningful on cron/manual; harmless on push).
      - name: Commit refreshed data
        if: ${{ github.event_name != 'push' }}
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json index.html
          git commit -m "chore: daily refresh $(date -u +%Y-%m-%d) [skip ci]" || echo "no changes"
          git push || echo "nothing to push"

      - name: Assemble site
        run: mkdir -p _site && cp index.html _site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
