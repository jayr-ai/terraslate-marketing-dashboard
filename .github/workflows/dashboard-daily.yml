# Deploys the TerraSlate marketing dashboard to GitHub Pages.
# - on push to main:      republish whatever data.json is committed (instant deploy)
# - daily cron:           re-run build + render + deploy (keeps the page fresh)
# - manual "Run workflow": deploy on demand
#
# NOTE on the daily DATA refresh: pulling fresh Meta numbers in the cloud needs a Meta
# Graph API token (the MCP connector used locally is not available in GitHub Actions).
# Until that token is added as a repo secret and wired into a pull step below, the daily
# cron only re-renders the committed data.json. The reliable refresh path today is: run
# the local pull (which updates data.json) and push - this workflow then deploys it.
name: dashboard-deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 06:00 America/Denver (MDT). Adjust for your timezone.
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: dashboard-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Rebuild from the committed data.json (reconcile gate + render guards run here).
      - name: Build and render
        run: |
          python3 build_dashboard.py
          python3 render.py

      - name: Assemble site
        run: mkdir -p _site && cp index.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
